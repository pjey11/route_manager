openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Sai Trips API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: visits
    description: Visit management
  - name: templates
    description: Notification templates
  - name: notifications
    description: WhatsApp notifications
  - name: profile
    description: Operator profile
  - name: storage
    description: Object storage
  - name: photos
    description: Visit photo management
  - name: ai-settings
    description: AI model configuration

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /visits:
    get:
      operationId: listVisits
      tags: [visits]
      summary: List visits for a date
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
            description: Date in YYYY-MM-DD format, defaults to today
      responses:
        "200":
          description: List of visits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitsResponse"

  /visits/upload:
    post:
      operationId: uploadVisits
      tags: [visits]
      summary: Upload Excel file with visits
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        "200":
          description: Visits uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /visits/dates:
    get:
      operationId: listVisitDates
      tags: [visits]
      summary: List all dates that have visits
      responses:
        "200":
          description: List of dates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatesResponse"

  /visits/{id}/start:
    post:
      operationId: startVisit
      tags: [visits]
      summary: Mark visit as started and send template 1 to contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Visit started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitActionResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /visits/{id}/complete:
    post:
      operationId: completeVisit
      tags: [visits]
      summary: Mark visit as complete, send template 3 to current and template 1 to next
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Visit completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitActionResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /visits/{id}/end:
    post:
      operationId: endVisit
      tags: [visits]
      summary: End last visit (Sai Palki ends), send template 3 to last person
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Last visit ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitActionResponse"

  /visits/{id}/end-day:
    post:
      operationId: endDay
      tags: [visits]
      summary: Mark the day as complete (Ending Sai day)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Day ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitActionResponse"

  /visits/{id}/volunteer-complete:
    post:
      operationId: volunteerComplete
      tags: [visits]
      summary: Volunteer marks a stop complete with a confirmed timestamp (no WhatsApp sent)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolunteerCompleteBody"
      responses:
        "200":
          description: Stop marked complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitActionResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /visits/{id}/last-home:
    post:
      operationId: lastHome
      tags: [visits]
      summary: Announce arrival at last home of the day — sends template 5 to group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Last home announced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitActionResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /visits/{id}/time:
    patch:
      operationId: updateVisitTime
      tags: [visits]
      summary: Update visit time and cascade the diff to all subsequent pending/started stops
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVisitTimeBody"
      responses:
        "200":
          description: Visit times updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateVisitTimeResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Visit already completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /visits/{id}/skip:
    post:
      operationId: skipVisit
      tags: [visits]
      summary: Admin skips a stop — hides it from the volunteer view
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Visit skipped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitActionResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /visits/{id}/geofence-alert:
    post:
      operationId: geofenceAlert
      tags: [visits]
      summary: Log that user is within 500m - returns template 2 message for manual send
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Geofence alert logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeofenceResponse"

  /visits/{id}/send-geofence:
    post:
      operationId: sendGeofenceMessage
      tags: [visits]
      summary: Send template 2 WhatsApp message (user is 2-3 mins away)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitActionResponse"

  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List all notification templates
      responses:
        "200":
          description: Templates list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplatesResponse"

  /templates/{id}:
    put:
      operationId: updateTemplate
      tags: [templates]
      summary: Update a notification template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTemplateBody"
      responses:
        "200":
          description: Template updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL for object storage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

  /visits/{id}/photos:
    get:
      operationId: listVisitPhotos
      tags: [photos]
      summary: List photos for a visit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Photos list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitPhotosResponse"
    post:
      operationId: addVisitPhoto
      tags: [photos]
      summary: Save uploaded photo metadata for a visit (max 3 per visit)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddVisitPhotoBody"
      responses:
        "200":
          description: Photo saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitPhoto"
        "400":
          description: Error (e.g. max photos reached)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /visits/{id}/photos/{photoId}:
    delete:
      operationId: deleteVisitPhoto
      tags: [photos]
      summary: Delete a visit photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: photoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Photo deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /visits/{id}/photos/{photoId}/analyze:
    post:
      operationId: analyzeVisitPhoto
      tags: [photos]
      summary: Run AI head count on a visit photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: photoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Head count result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzePhotoResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai-settings:
    get:
      operationId: getAiSettings
      tags: [ai-settings]
      summary: Get AI model settings
      responses:
        "200":
          description: AI settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSettings"
    put:
      operationId: updateAiSettings
      tags: [ai-settings]
      summary: Update AI model settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAiSettingsBody"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSettings"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get operator profile
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
    put:
      operationId: updateProfile
      tags: [profile]
      summary: Update operator profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications/bulk:
    post:
      operationId: sendBulkNotification
      tags: [notifications]
      summary: Send template 4 bulk notification to all contacts for a date
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkNotificationBody"
      responses:
        "200":
          description: Bulk notification sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkNotificationResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthUser:
      type: object
      properties:
        email:
          type: string
        isAuthenticated:
          type: boolean
        role:
          type: string
          enum: [admin, volunteer]
      required:
        - email
        - isAuthenticated
        - role

    VolunteerCompleteBody:
      type: object
      properties:
        completedAt:
          type: string
          description: ISO-8601 timestamp of when the stop was completed
        notes:
          type: string
        timeEdited:
          type: boolean
        devoteesAttended:
          type: integer
          description: Number of devotees attended at this stop
      required:
        - completedAt

    Visit:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        stopNumber:
          type: integer
        visitTime:
          type: string
        name:
          type: string
        phone:
          type: string
        streetAddress:
          type: string
        city:
          type: string
        postalCode:
          type: string
        prasadOffering:
          type: string
        status:
          type: string
          enum: [pending, started, in_transit, completed, ended, day_ended]
        isFirst:
          type: boolean
        isLast:
          type: boolean
        batchId:
          type: integer
        mapUrl:
          type: string
          nullable: true
          description: Tiny URL for the map to this stop
        completedAt:
          type: string
          nullable: true
          description: ISO-8601 timestamp of when the stop was confirmed complete by the volunteer
        timeEdited:
          type: boolean
          nullable: true
          description: Whether the volunteer manually edited the completion time
        completionNotes:
          type: string
          nullable: true
          description: Optional note left by the volunteer when marking the stop complete
        devoteesAttended:
          type: integer
          nullable: true
          description: Number of devotees attended at this stop
        skipped:
          type: boolean
          description: Whether this stop was skipped by the admin
      required:
        - id
        - date
        - stopNumber
        - visitTime
        - name
        - phone
        - streetAddress
        - city
        - postalCode
        - prasadOffering
        - status
        - isFirst
        - isLast
        - batchId

    VisitsResponse:
      type: object
      properties:
        visits:
          type: array
          items:
            $ref: "#/components/schemas/Visit"
        date:
          type: string
        isDayComplete:
          type: boolean
        totalCount:
          type: integer
        activeIndex:
          type: integer
          description: Index of the currently active visit (last started or last completed + 1)
      required:
        - visits
        - date
        - isDayComplete
        - totalCount

    UploadResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        count:
          type: integer
        date:
          type: string
        batchId:
          type: integer
      required:
        - success
        - message
        - count
        - date
        - batchId

    DatesResponse:
      type: object
      properties:
        dates:
          type: array
          items:
            type: string
      required:
        - dates

    VisitActionResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        visit:
          $ref: "#/components/schemas/Visit"
        whatsappSent:
          type: boolean
        whatsappError:
          type: string
      required:
        - success
        - visit
        - whatsappSent

    GeofenceResponse:
      type: object
      properties:
        shouldSendMessage:
          type: boolean
        message:
          type: string
        visit:
          $ref: "#/components/schemas/Visit"
      required:
        - shouldSendMessage
        - visit

    Template:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        content:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - description
        - content

    TemplatesResponse:
      type: object
      properties:
        templates:
          type: array
          items:
            $ref: "#/components/schemas/Template"
      required:
        - templates

    UpdateTemplateBody:
      type: object
      properties:
        content:
          type: string
        name:
          type: string
        description:
          type: string
      required:
        - content

    UpdateVisitTimeBody:
      type: object
      properties:
        visitTime:
          type: string
          description: New visit time in HH:MM format
      required:
        - visitTime

    UpdateVisitTimeResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        updatedCount:
          type: integer
      required:
        - success
        - message
        - updatedCount

    BulkNotificationBody:
      type: object
      properties:
        date:
          type: string
          description: Date in YYYY-MM-DD format
      required:
        - date

    Profile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - phone
        - updatedAt

    UpdateProfileBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
      required:
        - name
        - phone

    RequestUploadUrlBody:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string
      required:
        - name
        - size
        - contentType

    RequestUploadUrlResponse:
      type: object
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
      required:
        - uploadURL
        - objectPath

    VisitPhoto:
      type: object
      properties:
        id:
          type: integer
        visitId:
          type: integer
        objectPath:
          type: string
        headCount:
          type: integer
          nullable: true
        aiModel:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - visitId
        - objectPath
        - createdAt

    VisitPhotosResponse:
      type: object
      properties:
        photos:
          type: array
          items:
            $ref: "#/components/schemas/VisitPhoto"
      required:
        - photos

    AddVisitPhotoBody:
      type: object
      properties:
        objectPath:
          type: string
      required:
        - objectPath

    AnalyzePhotoResponse:
      type: object
      properties:
        headCount:
          type: integer
        aiModel:
          type: string
        photo:
          $ref: "#/components/schemas/VisitPhoto"
      required:
        - headCount
        - aiModel
        - photo

    AiSettings:
      type: object
      properties:
        id:
          type: integer
        provider:
          type: string
        modelId:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - provider
        - modelId
        - updatedAt

    UpdateAiSettingsBody:
      type: object
      properties:
        provider:
          type: string
        modelId:
          type: string
      required:
        - provider
        - modelId

    BulkNotificationResponse:
      type: object
      properties:
        success:
          type: boolean
        sent:
          type: integer
        failed:
          type: integer
        total:
          type: integer
        message:
          type: string
      required:
        - success
        - sent
        - failed
        - total
